<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timeline</title>
  </head>

  <body>
    <div class="app-container">
      <div class="control-ribbon" id="control-sidebar">
        <div class="control-section">
          <div class="section-content">
            <button id="btn-add" class="btn-primary" title="Add">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
              >
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
              </svg>
              <span class="btn-label">Add</span>
            </button>
          </div>
        </div>

        <div class="control-section-divider"></div>

        <div class="control-section">
          <div class="section-content">
            <div class="display-mode-toggle">
              <button id="btn-display-timeline" class="btn-active" title="Timeline view">
                <svg
                  width="12"
                  height="12"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                >
                  <line x1="3" y1="6" x2="21" y2="6" />
                  <line x1="3" y1="12" x2="15" y2="12" />
                  <line x1="3" y1="18" x2="18" y2="18" />
                </svg>
                <span class="btn-label">Timeline</span>
              </button>
              <button id="btn-display-calendar" title="Calendar view">
                <svg
                  width="12"
                  height="12"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="4" width="18" height="18" rx="2" />
                  <line x1="16" y1="2" x2="16" y2="6" />
                  <line x1="8" y1="2" x2="8" y2="6" />
                  <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
                <span class="btn-label">Calendar</span>
              </button>
            </div>
          </div>
        </div>

        <div class="control-section-divider"></div>

        <div class="control-section" id="section-timeline-controls">
          <div class="section-content">
            <div class="ribbon-dropdown-wrapper">
              <button id="btn-zoom-dropdown" class="ribbon-dropdown-trigger" title="Zoom level">
                <svg
                  width="12"
                  height="12"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="11" cy="11" r="8" />
                  <line x1="21" y1="21" x2="16.65" y2="16.65" />
                  <line x1="11" y1="8" x2="11" y2="14" />
                  <line x1="8" y1="11" x2="14" y2="11" />
                </svg>
                <span id="zoom-label">Months</span>
                <svg
                  class="chevron-down"
                  width="10"
                  height="10"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="6 9 12 15 18 9" />
                </svg>
              </button>
              <div id="zoom-dropdown" class="ribbon-dropdown" style="display: none"></div>
            </div>
            <div class="chevron-stepper">
              <button id="btn-start-prev" class="btn-icon-only" title="Previous">
                <svg
                  width="12"
                  height="12"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="15 18 9 12 15 6" />
                </svg>
              </button>
              <span class="stepper-label stepper-label-clickable" id="start-date-label">Oct 2025</span>
              <button id="btn-start-next" class="btn-icon-only" title="Next">
                <svg
                  width="12"
                  height="12"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="9 18 15 12 9 6" />
                </svg>
              </button>
            </div>
            <input
              type="date"
              id="start-date-picker"
              style="position: absolute; opacity: 0; pointer-events: none; width: 0; height: 0"
            />
            <button id="btn-today" title="Jump to today">
              <svg
                width="12"
                height="12"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="10" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <span class="btn-label">Today</span>
            </button>
            <button id="btn-autofit" title="Fit all items">
              <svg
                width="12"
                height="12"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="15 3 21 3 21 9" />
                <polyline points="9 21 3 21 3 15" />
                <line x1="21" y1="3" x2="14" y2="10" />
                <line x1="3" y1="21" x2="10" y2="14" />
              </svg>
              <span class="btn-label">Fit</span>
            </button>
          </div>
        </div>

        <div class="control-section-divider"></div>

        <div class="control-section">
          <div class="section-content">
            <button id="btn-undo" class="btn-icon-only" disabled title="Undo (Ctrl+Z)">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="1 4 1 10 7 10" />
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" />
              </svg>
            </button>
            <button id="btn-redo" class="btn-icon-only" disabled title="Redo (Ctrl+Y)">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="23 4 23 10 17 10" />
                <path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10" />
              </svg>
            </button>
          </div>
        </div>

        <div class="control-section-divider"></div>

        <div class="control-section">
          <div class="section-content">
            <div class="ribbon-dropdown-wrapper">
              <button id="btn-legend-dropdown" class="ribbon-dropdown-trigger" title="Legend options">
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 14 14"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                >
                  <line x1="3" y1="2" x2="3" y2="12" />
                  <line x1="6" y1="3" x2="12" y2="3" />
                  <line x1="6" y1="7" x2="12" y2="7" />
                  <line x1="6" y1="11" x2="12" y2="11" />
                </svg>
                <span class="btn-label">Legend</span>
                <svg
                  class="chevron-down"
                  width="8"
                  height="8"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="6 9 12 15 18 9" />
                </svg>
              </button>
              <div id="legend-dropdown" class="ribbon-dropdown" style="display: none"></div>
            </div>
          </div>
        </div>

        <div class="control-section-divider"></div>

        <div class="control-section">
          <div class="section-content">
            <div class="ribbon-dropdown-wrapper">
              <button id="btn-file-dropdown" class="ribbon-dropdown-trigger" title="File operations">
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                  <polyline points="14 2 14 8 20 8" />
                </svg>
                <span class="btn-label">File</span>
                <svg
                  class="chevron-down"
                  width="8"
                  height="8"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="3"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="6 9 12 15 18 9" />
                </svg>
              </button>
              <div id="file-dropdown" class="ribbon-dropdown" style="display: none"></div>
            </div>
            <input type="file" id="csv-file-input" accept=".csv" style="display: none" />
          </div>
        </div>

        <div class="control-section-divider"></div>

        <div class="control-section">
          <div class="section-content">
            <button id="btn-reset" class="btn-danger" title="Restart">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="3 6 5 6 21 6" />
                <path
                  d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                />
              </svg>
              <span class="btn-label">Restart</span>
            </button>
          </div>
        </div>
      </div>

      <div class="slide-viewport">
        <div class="slide" id="slide">
          <div id="app"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
